name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync --extra dev --locked
      - run: uv run ruff check .
      - run: uv run pytest

  command-center:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/command-center
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/command-center/package-lock.json
      - name: Install dependencies
        if: ${{ hashFiles('apps/command-center/package-lock.json') != '' }}
        run: npm ci
      - name: Test
        if: ${{ hashFiles('apps/command-center/package-lock.json') != '' }}
        run: npm test -- --run
      - name: Build
        if: ${{ hashFiles('apps/command-center/package-lock.json') != '' }}
        run: npm run build

